<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Font Studio Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&family=Hind:wght@400;500;600;700&family=Mukta:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700;800&family=Noto+Serif+Devanagari:wght@400;500;600;700;800&family=Tiro+Devanagari+Hindi:ital@0;1&family=IBM+Plex+Sans+Devanagari:wght@400;500;600;700&family=Kalam:wght@400;700&family=Yatra+One&family=Tillana:wght@400;600;700;800&family=Baloo+2:wght@400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&family=Teko:wght@400;500;600;700&family=Khand:wght@400;500;600;700&family=Gotu&family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:wght@400;600;700&family=Cinzel:wght@400;600;700&family=Orbitron:wght@400;500;600;700&family=Josefin+Sans:wght@400;500;600;700&family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Rubik:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=Manrope:wght@400;500;700;800&family=Urbanist:wght@400;500;600;700;800&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&family=Archivo:wght@400;500;600;700&family=Exo+2:wght@400;500;600;700&family=Righteous&family=Abril+Fatface&family=Cormorant+Garamond:wght@400;500;600;700&family=Anton&family=Signika:wght@400;500;600;700&family=Fjalla+One&family=Quicksand:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Cabin:wght@400;500;600;700&family=Varela+Round&family=Asap:wght@400;500;600;700&family=Libre+Baskerville:wght@400;700&family=PT+Sans:wght@400;700&family=Ubuntu:wght@400;500;700&family=Inconsolata:wght@400;500;600;700&family=Amaranth:wght@400;700&family=Chakra+Petch:wght@400;500;600;700&family=Alfa+Slab+One&family=Creepster&family=Nosifer&family=Lobster&family=Pacifico&family=Dancing+Script:wght@400;500;600;700&family=Great+Vibes&family=Satisfy&family=Permanent+Marker&family=Shadows+Into+Light&family=Courgette&family=Kaushan+Script&family=Marck+Script&family=Sacramento&family=Yellowtail&family=Handlee&family=Patrick+Hand&family=Gloria+Hallelujah&family=Caveat:wght@400;500;600;700&family=Amatic+SC:wght@400;700&family=Pathway+Gothic+One&family=Arimo:wght@400;500;700&family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;500;600;700&family=Lato:wght@400;700&family=Open+Sans:wght@400;500;600;700&family=Raleway:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&family=Kanit:wght@400;500;600;700&family=Prompt:wght@400;500;600;700&family=Mulish:wght@400;500;600;700&family=Heebo:wght@400;500;700&family=Titillium+Web:wght@400;600;700&family=Yanone+Kaffeesatz:wght@400;500;600;700&family=Questrial&family=Catamaran:wght@400;500;600;700&family=Comfortaa:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&family=Encode+Sans:wght@400;500;600;700&family=Red+Hat+Display:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Outfit:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=Syne:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700&family=Assistant:wght@400;500;600;700&family=Didact+Gothic&family=Jost:wght@400;500;600;700&family=Philosopher:wght@400;700&family=Prata&family=Domine:wght@400;500;600;700&family=Zilla+Slab:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sanscriptjs@0.0.1/sanscript.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">F</div>
        <div>
          <h1>Font Studio Pro</h1>
          <p>Photo + video + transparent text + 100 fonts editor</p>
        </div>
      </div>

      <div class="top-actions">
        <button class="btn ghost" id="toggleMenuBtn">Hide Menu</button>

        <div class="size-box">
          <div>
            <label>Preset Size</label>
            <select id="downloadPreset">
              <option value="original">Original</option>
              <option value="1080x1080">1080 x 1080</option>
              <option value="1080x1350">1080 x 1350</option>
              <option value="1080x1920">1080 x 1920</option>
              <option value="1920x1080">1920 x 1080</option>
              <option value="2048x2048">2048 x 2048</option>
            </select>
          </div>
          <div>
            <label>Width</label>
            <input type="number" id="customWidth" value="1080">
          </div>
          <div>
            <label>Height</label>
            <input type="number" id="customHeight" value="1080">
          </div>
        </div>

        <button class="btn success" id="downloadBtnTop">Download PNG</button>
      </div>
    </header>

    <div class="layout" id="mainLayout">
      <aside class="panel left-panel" id="menuPanel">
        <div class="panel-head">
          <h2>MENU</h2>
        </div>

        <div class="panel-body">
          <div class="menu-group">
            <h3>Text Input</h3>

            <label>Type Text</label>
            <textarea id="inputText">surendra</textarea>

            <div class="row mt10">
              <div>
                <label>Input Mode</label>
                <select id="inputMode">
                  <option value="auto">Auto Detect</option>
                  <option value="latin">English / Hinglish</option>
                  <option value="devanagari">Hindi / Marathi</option>
                </select>
              </div>
              <div>
                <label>Output Mode</label>
                <select id="outputMode">
                  <option value="hindi">Hindi</option>
                  <option value="marathi">Marathi Style</option>
                  <option value="raw">Original</option>
                </select>
              </div>
            </div>

            <div class="row mt10">
              <button class="btn primary" id="convertBtn">Convert</button>
              <button class="btn info" id="addTextBtn">Show / Add Text</button>
            </div>

            <div class="mt10">
              <label>Quick Samples</label>
              <div class="chips">
                <button class="chip" data-sample="surendra">surendra</button>
                <button class="chip" data-sample="mera naam surendra hai">mera naam surendra hai</button>
                <button class="chip" data-sample="सुरेंद्र">सुरेंद्र</button>
                <button class="chip" data-sample="माझं नाव सुरेंद्र आहे">माझं नाव सुरेंद्र आहे</button>
              </div>
            </div>
          </div>

          <div class="menu-group">
            <h3>Text Style</h3>

            <div class="row">
              <div>
                <label>Text Color</label>
                <input type="color" id="textColor" value="#ffffff">
              </div>
              <div>
                <label>Text Background</label>
                <input type="color" id="textBgColor" value="#000000">
              </div>
            </div>

            <div class="row mt10">
              <div>
                <label>Font Size</label>
                <input type="number" id="fontSize" value="34" min="10" max="220">
              </div>
              <div>
                <label>Opacity</label>
                <input type="number" id="opacityInput" value="1" min="0" max="1" step="0.1">
              </div>
            </div>

            <div class="row mt10">
              <div>
                <label>Stroke Color</label>
                <input type="color" id="strokeColor" value="#000000">
              </div>
              <div>
                <label>Stroke Width</label>
                <input type="number" id="strokeWidth" value="2" min="0" max="20">
              </div>
            </div>

            <div class="row mt10">
              <div>
                <label>Bg Opacity</label>
                <input type="number" id="textBgOpacity" value="0.55" min="0" max="1" step="0.05">
              </div>
              <div>
                <label>Shadow Blur</label>
                <input type="number" id="shadowBlur" value="10" min="0" max="50">
              </div>
            </div>

            <div class="row mt10">
              <div>
                <label>Shadow Color</label>
                <input type="color" id="shadowColor" value="#000000">
              </div>
              <div>
                <label>Letter Spacing</label>
                <input type="number" id="charSpacing" value="0" min="-200" max="1000">
              </div>
            </div>

            <div class="row mt10">
              <div>
                <label>Line Height</label>
                <input type="number" id="lineHeight" value="1.2" min="0.6" max="3" step="0.1">
              </div>
              <div>
                <label>Canvas Background</label>
                <input type="color" id="canvasBg" value="#111827">
              </div>
            </div>

            <div class="row mt10">
              <div>
                <label>Shadow X</label>
                <input type="number" id="shadowX" value="2" min="-50" max="50">
              </div>
              <div>
                <label>Shadow Y</label>
                <input type="number" id="shadowY" value="2" min="-50" max="50">
              </div>
            </div>

            <div class="row3 mt10">
              <button class="btn ghost" id="boldBtn">Bold</button>
              <button class="btn ghost" id="italicBtn">Italic</button>
              <button class="btn ghost" id="underlineBtn">Underline</button>
            </div>

            <div class="row mt10">
              <button class="btn danger" id="bloodStyleBtn">Blood Style</button>
              <button class="btn ghost" id="normalStyleBtn">Normal Style</button>
            </div>

            <div class="row mt10">
              <button class="btn info" id="transparentTextBtn">Transparent Text</button>
              <button class="btn ghost" id="solidTextBtn">Solid Text</button>
            </div>
          </div>

          <div class="menu-group">
            <h3>Photo / Video</h3>

            <input type="file" id="imageUpload" class="hidden-input" accept="image/*">
            <input type="file" id="cameraUpload" class="hidden-input" accept="image/*" capture="environment">
            <input type="file" id="videoUpload" class="hidden-input" accept="video/*">

            <div class="row">
              <button class="btn info" id="galleryImageBtn">Select Photo</button>
              <button class="btn warn" id="cameraBtn">Camera Photo</button>
            </div>

            <div class="row mt10">
              <button class="btn info" id="videoBtn">Select Video</button>
              <button class="btn success" id="captureFrameBtn">Add From Video</button>
            </div>

            <video id="hiddenVideo" class="video-preview" controls playsinline></video>
            <div class="status" id="mediaStatus">No media selected.</div>
          </div>

          <div class="menu-group">
            <h3>Layer</h3>

            <div class="row3">
              <button class="btn ghost" id="bringFrontBtn">Front</button>
              <button class="btn ghost" id="sendBackBtn">Back</button>
              <button class="btn ghost" id="duplicateBtn">Copy</button>
            </div>

            <div class="row mt10">
              <button class="btn danger" id="deleteSelectedBtn">Delete</button>
              <button class="btn ghost" id="clearCanvasBtn">Clear All</button>
            </div>
          </div>
        </div>
      </aside>

      <main class="panel center-panel">
        <div class="panel-head">
          <h2>EDITOR</h2>
        </div>

        <div class="editor-shell">
          <div class="preview-strip">
            <div class="preview-card fade-up">
              <h4>Converted Output</h4>
              <div id="previewOutput" class="preview-output">सुरेंद्र</div>
            </div>
          </div>

          <div class="media-box fade-up delay-1">
            <div class="canvas-wrap">
              <div class="canvas-stage">
                <canvas id="editorCanvas" width="760" height="470"></canvas>
              </div>
            </div>
          </div>

          <div class="editor-toolbar fade-up delay-2">
            <button class="btn primary" id="addSampleBtn">Add “सुरेंद्र”</button>
            <button class="btn ghost" id="leftAlignBtn">Left</button>
            <button class="btn ghost" id="centerAlignBtn">Center</button>
            <button class="btn ghost" id="rightAlignBtn">Right</button>
            <button class="btn success" id="downloadBtn">Download PNG</button>
          </div>
        </div>
      </main>

      <aside class="panel right-panel">
        <div class="panel-head">
          <h2>100 FONTS</h2>
        </div>
        <div class="panel-body">
          <div id="fontList" class="font-list"></div>
        </div>
      </aside>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
